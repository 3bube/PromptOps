<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PromptOps — Expert AI Prompts, Instantly</title>
    <meta
      name="description"
      content="PromptOps turns rough ideas into structured, high-output AI prompts for coding, writing, marketing, and operations."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "Space Grotesk", sans-serif;
        background: #08080e;
        color: #eeeef5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: #08080e;
      }
      ::-webkit-scrollbar-thumb {
        background: #2a2a45;
        border-radius: 3px;
      }
      ::selection {
        background: rgba(124, 92, 252, 0.3);
      }
      :focus-visible {
        outline: 2px solid #7c5cfc;
        outline-offset: 2px;
        border-radius: 4px;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(22px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      @keyframes pulse-glow {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }
      @keyframes blurIn {
        from {
          filter: blur(14px);
          opacity: 0;
        }
        to {
          filter: blur(0px);
          opacity: 1;
        }
      }
      .blur-in {
        animation: blurIn 1.1s cubic-bezier(0.22, 0.68, 0, 1) both;
        animation-delay: 0.55s;
        display: inline-block;
      }

      .fade-up {
        animation: fadeUp 0.65s cubic-bezier(0.22, 0.68, 0, 1.2) both;
      }
      .fade-up-1 {
        animation-delay: 0.12s;
      }
      .fade-up-2 {
        animation-delay: 0.22s;
      }
      .fade-up-3 {
        animation-delay: 0.32s;
      }
      .fade-up-4 {
        animation-delay: 0.44s;
      }
      .float {
        animation: float 7s ease-in-out infinite;
      }

      button,
      a {
        font-family: "Space Grotesk", sans-serif;
      }
      select {
        appearance: none;
        outline: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" src="promptops-hero.jsx"></script>
    <script type="text/babel" src="promptops-sections.jsx"></script>

    <script type="text/babel">
      const { useState, useEffect } = React;

      const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/ {
        accentColor: "#7c5cfc",
        showPricing: true,
      }; /*EDITMODE-END*/

      function App() {
        const [tweaks, setTweaks] = useState(() => {
          try {
            const saved = localStorage.getItem("promptops-tweaks");
            return saved
              ? { ...TWEAK_DEFAULTS, ...JSON.parse(saved) }
              : TWEAK_DEFAULTS;
          } catch {
            return TWEAK_DEFAULTS;
          }
        });
        const [tweaksOpen, setTweaksOpen] = useState(false);

        useEffect(() => {
          const handler = (e) => {
            if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
            if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
          };
          window.addEventListener("message", handler);
          window.parent.postMessage({ type: "__edit_mode_available" }, "*");
          return () => window.removeEventListener("message", handler);
        }, []);

        const updateTweak = (key, val) => {
          const next = { ...tweaks, [key]: val };
          setTweaks(next);
          localStorage.setItem("promptops-tweaks", JSON.stringify(next));
          window.parent.postMessage(
            { type: "__edit_mode_set_keys", edits: next },
            "*",
          );
        };

        const a = tweaks.accentColor;

        return (
          <>
            <Nav />
            <main>
              <Hero accentColor={a} />
              <HowItWorks accentColor={a} />
              <Features accentColor={a} />
              <DemoMockup accentColor={a} />
              <UseCases accentColor={a} />
              <SocialProof accentColor={a} />
              {tweaks.showPricing && <Pricing accentColor={a} />}
              <FAQ accentColor={a} />
              <CTABanner accentColor={a} />
            </main>
            <Footer />
            {tweaksOpen && (
              <TweaksPanel tweaks={tweaks} updateTweak={updateTweak} />
            )}
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
